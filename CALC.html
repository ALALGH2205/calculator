<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulator Web - UTS Pemrograman Web 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f0f5;
      --card-bg: #e8e8ed;
      --display-bg: #f5a623;
      --display-text: #fff;
      --display-sub: rgba(255,255,255,0.75);
      --btn-bg: #fff;
      --btn-shadow: 0 4px 14px rgba(0,0,0,0.10);
      --btn-text: #222;
      --btn-op-bg: #f2f2f7;
      --btn-op-text: #555;
      --btn-eq-bg: #f5a623;
      --btn-eq-text: #fff;
      --btn-ac-text: #e74c3c;
      --radius: 28px;
      --btn-radius: 16px;
      --name-bg: rgba(255,255,255,0.85);
      --name-color: #333;
      --name-border: rgba(0,0,0,0.08);
    }

    [data-theme="dark"] {
      --bg: #1c1c1e;
      --card-bg: #2c2c2e;
      --display-bg: #1c1c1e;
      --display-sub: rgba(255,255,255,0.5);
      --btn-bg: #3a3a3c;
      --btn-shadow: 0 4px 14px rgba(0,0,0,0.35);
      --btn-text: #f5f5f7;
      --btn-op-bg: #2c2c2e;
      --btn-op-text: #aaa;
      --btn-eq-bg: #f5a623;
      --btn-ac-text: #ff6b6b;
      --name-bg: rgba(255,255,255,0.06);
      --name-color: #ccc;
      --name-border: rgba(255,255,255,0.1);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: background 0.4s;
      padding: 20px;
    }

    /* Student Info */
    .student-info {
      background: var(--name-bg);
      border: 1px solid var(--name-border);
      border-radius: 14px;
      padding: 12px 30px;
      margin-bottom: 20px;
      text-align: left;
      transition: background 0.4s, border 0.4s;
    }
    .student-info p {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--name-color);
      line-height: 1.8;
      letter-spacing: 0.3px;
    }

    /* Calculator */
    .calculator {
      background: var(--card-bg);
      border-radius: var(--radius);
      width: 310px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      transition: background 0.4s;
    }

    /* Display */
    .display {
      background: var(--display-bg);
      padding: 28px 22px 18px;
      min-height: 115px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      transition: background 0.4s;
    }

    .display-expr {
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--display-text);
      word-break: break-all;
      text-align: right;
      line-height: 1.2;
      min-height: 2.6rem;
    }

    .display-result {
      font-size: 1rem;
      font-weight: 400;
      color: var(--display-sub);
      text-align: right;
      margin-top: 4px;
      min-height: 1.4rem;
    }

    .display.shake {
      animation: shake 0.32s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Icon Row */
    .icon-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 14px 16px 6px;
    }
    .icon-btn {
      background: var(--btn-op-bg);
      border: none;
      border-radius: 10px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      color: var(--btn-op-text);
      transition: transform 0.12s, opacity 0.12s;
    }
    .icon-btn:active { transform: scale(0.91); opacity: 0.7; }

    /* Button Grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 6px 16px 20px;
    }

    .btn {
      background: var(--btn-bg);
      border: none;
      border-radius: var(--btn-radius);
      height: 64px;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--btn-text);
      cursor: pointer;
      box-shadow: var(--btn-shadow);
      font-family: 'Nunito', sans-serif;
      user-select: none;
      transition: transform 0.12s, filter 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { filter: brightness(0.95); }
    .btn:active { transform: scale(0.92); box-shadow: none; }

    .btn.op {
      background: var(--btn-op-bg);
      color: var(--btn-op-text);
      box-shadow: none;
    }
    .btn.ac {
      background: var(--btn-bg);
      color: var(--btn-ac-text);
      font-size: 0.95rem;
      font-weight: 700;
    }
    .btn.eq {
      background: var(--btn-eq-bg);
      color: var(--btn-eq-text);
      box-shadow: 0 4px 16px rgba(245,166,35,0.4);
    }

    /* Error */
    .error-msg {
      color: #e74c3c;
      font-size: 0.78rem;
      text-align: center;
      min-height: 1.1rem;
      margin-top: 8px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .error-msg.show { opacity: 1; }

    /* Toggle */
    .toggle-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
    }
    .toggle-btn {
      background: var(--card-bg);
      border: 1px solid var(--name-border);
      border-radius: 20px;
      padding: 7px 20px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--name-color);
      cursor: pointer;
      transition: all 0.25s;
    }
    .toggle-btn.active {
      background: #f5a623;
      color: #fff;
      border-color: #f5a623;
    }

    @media (max-width: 380px) {
      .calculator { width: 280px; }
      .btn { height: 56px; font-size: 1.05rem; }
      .display-expr { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <!-- Student Info -->
  <div class="student-info">
    <p>Nama : Ripan Ripaldi</p>
    <p>NIM &nbsp;: 231011450179</p>
  </div>

  <!-- Calculator -->
  <div class="calculator" id="calculator">

    <div class="display" id="display">
      <div class="display-expr" id="expr">0</div>
      <div class="display-result" id="result"></div>
    </div>

    <div class="icon-row">
      <button class="icon-btn" title="Info">⊙</button>
      <button class="icon-btn" title="History">▬</button>
      <button class="icon-btn" title="Copy" id="copyBtn">⊞</button>
      <button class="icon-btn" title="Backspace" id="backspaceBtn">⌫</button>
    </div>

    <div class="buttons">
      <button class="btn ac" data-action="clear">AC</button>
      <button class="btn op" data-action="sign">⁺∕₋</button>
      <button class="btn op" data-action="percent">%</button>
      <button class="btn op" data-op="÷">÷</button>

      <button class="btn" data-num="7">7</button>
      <button class="btn" data-num="8">8</button>
      <button class="btn" data-num="9">9</button>
      <button class="btn op" data-op="×">×</button>

      <button class="btn" data-num="4">4</button>
      <button class="btn" data-num="5">5</button>
      <button class="btn" data-num="6">6</button>
      <button class="btn op" data-op="−">−</button>

      <button class="btn" data-num="1">1</button>
      <button class="btn" data-num="2">2</button>
      <button class="btn" data-num="3">3</button>
      <button class="btn op" data-op="+">+</button>

      <button class="btn op" data-action="sign">⁺∕₋</button>
      <button class="btn" data-num="0">0</button>
      <button class="btn" data-num=".">.</button>
      <button class="btn eq" data-action="equals">=</button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="toggle-bar">
    <button class="toggle-btn active" id="btnLight">☀ Light</button>
    <button class="toggle-btn" id="btnDark">☽ Dark</button>
  </div>

  <script>
    let cur = '', op = null, first = null, justCalc = false;

    const exprEl = document.getElementById('expr');
    const resEl  = document.getElementById('result');
    const errEl  = document.getElementById('errorMsg');
    const dispEl = document.getElementById('display');

    function fmt(n) {
      if (n === null || n === '') return '';
      return parseFloat(parseFloat(n).toPrecision(10)).toString();
    }

    function buildExpr() {
      if (first !== null && op) return fmt(first) + op + (cur || '');
      return cur || '0';
    }

    function updateUI(sub) {
      exprEl.textContent = buildExpr();
      resEl.textContent  = sub || '';
    }

    function showErr(msg) {
      errEl.textContent = '⚠ ' + msg;
      errEl.classList.add('show');
      dispEl.classList.add('shake');
      setTimeout(() => {
        errEl.classList.remove('show');
        dispEl.classList.remove('shake');
      }, 1800);
    }

    function calc(a, b, o) {
      if (o === '+') return a + b;
      if (o === '−') return a - b;
      if (o === '×') return a * b;
      if (o === '÷') {
        if (b === 0) { showErr('Tidak bisa dibagi nol!'); return null; }
        return a / b;
      }
      return null;
    }

    function inputNum(d) {
      if (d === '.' && cur.includes('.')) return;
      if (justCalc) {
        cur = d === '.' ? '0.' : d;
        first = null; op = null; justCalc = false;
      } else {
        if (cur === '0' && d !== '.') cur = d;
        else { if (cur.length >= 12) return; cur += d; }
      }
      let sub = '';
      if (first !== null && op && cur !== '') {
        let p = calc(first, parseFloat(cur), op);
        if (p !== null) sub = fmt(p);
      }
      updateUI(sub);
    }

    function chooseOp(o) {
      if (cur === '' && first === null) { showErr('Masukkan angka terlebih dahulu!'); return; }
      if (cur !== '' && first !== null && op) {
        let r = calc(first, parseFloat(cur), op);
        if (r === null) return;
        first = r; cur = '';
      } else if (cur !== '') { first = parseFloat(cur); cur = ''; }
      op = o;
      updateUI('');
    }

    function doEquals() {
      if (first === null) { showErr('Masukkan operasi lengkap!'); return; }
      if (cur === '')     { showErr('Masukkan angka kedua!'); return; }
      if (op === null)    { showErr('Pilih operator terlebih dahulu!'); return; }
      let b    = parseFloat(cur);
      let expr = fmt(first) + op + fmt(b);
      let r    = calc(first, b, op);
      if (r === null) return;
      exprEl.textContent = fmt(r);
      resEl.textContent  = expr;
      first = r; cur = ''; op = null; justCalc = true;
    }

    function clearAll()   { cur = ''; op = null; first = null; justCalc = false; updateUI(''); }
    function backspace()  {
      if (justCalc) { clearAll(); return; }
      if (cur.length > 0) { cur = cur.slice(0, -1); updateUI(''); }
    }
    function percent()    { if (!cur) return; cur = (parseFloat(cur) / 100).toString(); updateUI(''); }
    function toggleSign() {
      if (!cur || cur === '0') return;
      cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur;
      updateUI('');
    }

    document.querySelector('.buttons').addEventListener('click', e => {
      const b = e.target.closest('.btn');
      if (!b) return;
      if (b.dataset.num !== undefined)           inputNum(b.dataset.num);
      else if (b.dataset.op)                     chooseOp(b.dataset.op);
      else if (b.dataset.action === 'clear')     clearAll();
      else if (b.dataset.action === 'equals')    doEquals();
      else if (b.dataset.action === 'sign')      toggleSign();
      else if (b.dataset.action === 'percent')   percent();
    });

    document.getElementById('backspaceBtn').addEventListener('click', backspace);
    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard && navigator.clipboard.writeText(exprEl.textContent);
    });

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.')     inputNum('.');
      else if (e.key === '+')     chooseOp('+');
      else if (e.key === '-')     chooseOp('−');
      else if (e.key === '*')     chooseOp('×');
      else if (e.key === '/') { e.preventDefault(); chooseOp('÷'); }
      else if (e.key === 'Enter' || e.key === '=') doEquals();
      else if (e.key === 'Backspace') backspace();
      else if (e.key === 'Escape')    clearAll();
    });

    document.getElementById('btnLight').addEventListener('click', () => {
      document.documentElement.removeAttribute('data-theme');
      document.getElementById('btnLight').classList.add('active');
      document.getElementById('btnDark').classList.remove('active');
    });
    document.getElementById('btnDark').addEventListener('click', () => {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('btnDark').classList.add('active');
      document.getElementById('btnLight').classList.remove('active');
    });
  </script>
</body>
</html>
